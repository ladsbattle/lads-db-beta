<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面板資料庫｜戀與深空戰鬥討論群</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060b18;
  --bg2: #0d1526;
  --bg3: #111e35;
  --card: #0f1a2e;
  --card-hover: #162340;
  --border: rgba(150,180,240,0.2);
  --border-bright: rgba(180,210,255,0.45);
  --accent: #b8d4ff;
  --accent2: #c8b4ff;
  --gold: #ffd166;
  --text: #f0f6ff;
  --text-muted: #b0c8e8;
  --text-dim: #6a88b0;

  /* per-orbit colours (chip bg / card top bar / badge) */
  --col-open:   #d4d4d4; --col-open-bg:   rgba(212,212,212,0.13); --col-open-border:   rgba(212,212,212,0.4);
  --col-light:  #c9b8ff; --col-light-bg:  rgba(201,184,255,0.13); --col-light-border:  rgba(201,184,255,0.4);
  --col-ice:    #93d4ff; --col-ice-bg:    rgba(147,212,255,0.13); --col-ice-border:    rgba(147,212,255,0.4);
  --col-fire:   #ffb3c1; --col-fire-bg:   rgba(255,179,193,0.13); --col-fire-border:   rgba(255,179,193,0.4);
  --col-energy: #ff9999; --col-energy-bg: rgba(255,153,153,0.13); --col-energy-border: rgba(255,153,153,0.4);
  --col-gravity:#ffb47a; --col-gravity-bg:rgba(255,207,145,0.13); --col-gravity-border:rgba(255,207,145,0.4);
  --col-wave:   #ffe07a; --col-wave-bg:   rgba(232,200,74,0.13);   --col-wave-border:   rgba(232,200,74,0.4);
  --col-metal:  #0e94a8; --col-metal-bg:  rgba(14,148,168,0.16);   --col-metal-border:  rgba(14,148,168,0.45);
}

.site-footer {
  text-align: center;
  font-size: 13px;
  color: #888;
  padding: 24px 12px 16px;
  margin-top: 40px;
  line-height: 2.2;
}

.site-footer a {
  color: #aaa;
  text-decoration: none;
  transition: opacity 0.2s ease;
}

.site-footer a:hover {
  opacity: 0.7;
  text-decoration: underline;
}



* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Star background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.35) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(147,212,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(201,184,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Header */
header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 3rem 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
}

.site-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 600;
  color: #f0f6ff;
  letter-spacing: 0.15em;
  text-shadow: 0 0 30px rgba(180,210,255,0.4);
  margin-bottom: 0.3rem;
}

.site-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.2em;
}

/* Main layout */
.container {
  position: relative;
  z-index: 10;
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.25rem;
}

/* Filter panel */
.filter-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 2rem;
}

.filter-title {
  font-size: 0.82rem;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.filter-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1.125rem;
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem 1.5rem;
  align-items: flex-end;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex: 1 1 180px;
  min-width: 0;
}

.filter-group label {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

.orbit-group,
.panel-filter-fields {
  width: 100%;
}
.orbit-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 0.65rem;
}
.filter-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-top: 1.25rem;
}
.panel-filter-fields { margin-top: 1.25rem; }
.endless-filter-fields {
  margin-top: 0;
}
.endless-filter-fields .partner-group,
.endless-filter-fields .video-group {
  min-width: 0;
}
.endless-filter-panel .filter-group.video-group {
  flex: 0 1 170px;
}

/* 軌道 type chips — 開放（2欄）與定向（3欄x2列）分組，固定網格避免跑版 */
.orbit-chips {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 0.5rem;
  width: 100%;
}
.orbit-row-open {
  display: contents;
}
.orbit-divider {
  display: none;
}
.orbit-grid-directional {
  display: contents;
}
.orbit-chips .chip {
  width: 100%;
  text-align: center;
  box-sizing: border-box;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.chip {
  padding: 0.56rem 0.4rem;
  border-radius: 10px;
  border: 1px solid rgba(150,180,240,0.22);
  background: rgba(255,255,255,0.03);
  color: var(--text-muted);
  font-size: 0.78rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.chip:hover { border-color: var(--border-bright); color: var(--text); }
.chip[data-orbit="開放"].active { background: var(--col-open-bg);   border-color: var(--col-open-border);   color: var(--col-open); }
.chip[data-orbit="光"].active   { background: var(--col-light-bg);  border-color: var(--col-light-border);  color: var(--col-light); }
.chip[data-orbit="冰"].active   { background: var(--col-ice-bg);    border-color: var(--col-ice-border);    color: var(--col-ice); }
.chip[data-orbit="火"].active   { background: var(--col-fire-bg);   border-color: var(--col-fire-border);   color: var(--col-fire); }
.chip[data-orbit="能量"].active { background: var(--col-energy-bg); border-color: var(--col-energy-border); color: var(--col-energy); }
.chip[data-orbit="引力"].active { background: var(--col-gravity-bg);border-color: var(--col-gravity-border);color: var(--col-gravity); }
.chip[data-orbit="波動"].active { background: var(--col-wave-bg);   border-color: var(--col-wave-border);   color: var(--col-wave); }
.chip[data-orbit="金屬"].active { background: var(--col-metal-bg);  border-color: var(--col-metal-border);  color: var(--col-metal); }

/* Layer single input */
.layer-input {
  width: 100%;
  height: 2.375rem;
  box-sizing: border-box;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.52rem 0.75rem;
  color: var(--text);
  font-size: 0.8rem;
  font-family: 'Noto Sans TC', sans-serif;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.layer-input:focus { border-color: var(--accent); }
.layer-input::placeholder { color: var(--text-dim); }
.layer-input.error-input { border-color: #f87171; }
.layer-error-msg {
  display: none;
  font-size: 0.68rem;
  color: #f87171;
  margin-top: 0.3rem;
  line-height: 1.5;
  max-width: 200px;
}
.layer-error-msg.show { display: block; }

/* hide number input spinners */
.layer-input::-webkit-outer-spin-button,
.layer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.layer-input { -moz-appearance: textfield; }

/* Card selector input */
.card-input {
  height: 2.375rem;
  box-sizing: border-box;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.52rem 0.75rem;
  color: var(--text);
  font-size: 0.8rem;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.card-input:focus { border-color: var(--accent); }
.card-input::placeholder { color: var(--text-dim); }

/* Reset btn */
.btn-reset {
  flex: 0 0 auto;
  padding: 0.4rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  align-self: flex-end;
  min-height: 2rem;
}
.btn-reset:hover { border-color: var(--border-bright); color: var(--text); }

.btn-reset-compact {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  min-height: 0;
  padding: 0.32rem 0.8rem;
  border-radius: 999px;
  align-self: auto;
  font-size: 0.75rem;
}
.btn-reset-compact svg {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

.video-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  gap: 0.5rem;
  height: 2.375rem;
  box-sizing: border-box;
  padding: 0.52rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text);
  font-size: 0.75rem;
  font-family: 'Noto Sans TC', sans-serif;
  letter-spacing: 0;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.video-toggle:hover { border-color: var(--border-bright); color: var(--text); }
.video-toggle input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.video-switch {
  width: 30px;
  height: 17px;
  border-radius: 999px;
  background: rgba(184,212,255,0.25);
  position: relative;
  flex-shrink: 0;
  transition: background 0.2s;
}
.video-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform 0.2s;
}
.video-toggle:has(input:checked) .video-switch {
  background: rgba(184,212,255,0.38);
}
.video-toggle:has(input:checked) .video-switch::before {
  transform: translateX(13px);
}
.video-toggle:has(input:checked) {
  border-color: var(--border);
  background: var(--bg3);
  color: var(--text);
}

.dynamic-filter-panel {
  display: none;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.dynamic-filter-panel.show { display: block; }
.dynamic-filter-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.85rem;
}
.dynamic-filter-title {
  font-size: 0.82rem;
  color: var(--text-muted);
  letter-spacing: 0.25em;
}
.dynamic-filter-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1rem;
}
.dynamic-filter-grid.single-column {
  grid-template-columns: 1fr;
}
.dynamic-layer-box {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 0.85rem;
}
.dynamic-layer-title {
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  margin-bottom: 0.65rem;
}
.dynamic-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}
.dynamic-chip {
  padding: 0.28rem 0.65rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
}
.dynamic-chip:hover {
  border-color: var(--border-bright);
  color: var(--text);
}
.dynamic-chip.active {
  border-color: var(--accent);
  background: rgba(184,212,255,0.22);
  color: #ffffff;
  box-shadow: 0 0 0 1px rgba(184,212,255,0.18), 0 0 14px rgba(184,212,255,0.16);
  font-weight: 500;
}
.dynamic-empty {
  color: var(--text-dim);
  font-size: 0.72rem;
}
.dynamic-no-match {
  display: none;
  margin-top: 0.8rem;
  color: #f8caca;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
}
.dynamic-no-match.show { display: block; }

/* Results info */
.results-info {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
  letter-spacing: 0.05em;
}
.results-info span { color: var(--accent); }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 1rem;
}

/* Card */
.panel-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.1rem;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.panel-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.25s;
}
.panel-card:hover { background: var(--card-hover); border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.panel-card:hover::before { opacity: 1; }

.card-labels,
.card-meta-right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.card-orbit-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.card-labels {
  min-width: 0;
  flex-wrap: wrap;
}
.card-meta-right { flex-shrink: 0; }

/* orbit-specific top bars */
.panel-card[data-orbit="開放"]::before  { background: var(--col-open); }
.panel-card[data-orbit="光"]::before    { background: var(--col-light); }
.panel-card[data-orbit="冰"]::before    { background: var(--col-ice); }
.panel-card[data-orbit="火"]::before    { background: var(--col-fire); }
.panel-card[data-orbit="能量"]::before  { background: var(--col-energy); }
.panel-card[data-orbit="引力"]::before  { background: var(--col-gravity); }
.panel-card[data-orbit="波動"]::before  { background: var(--col-wave); }
.panel-card[data-orbit="金屬"]::before  { background: var(--col-metal); }

/* orbit badges on card */
.orbit-badge { font-size: 0.65rem; letter-spacing: 0.1em; padding: 0.18rem 0.6rem; border-radius: 999px; border: 1px solid; font-weight: 500; }
.orbit-badge[data-orbit="開放"]  { color: var(--col-open);   border-color: var(--col-open-border);   background: var(--col-open-bg); }
.orbit-badge[data-orbit="光"]    { color: var(--col-light);  border-color: var(--col-light-border);  background: var(--col-light-bg); }
.orbit-badge[data-orbit="冰"]    { color: var(--col-ice);    border-color: var(--col-ice-border);    background: var(--col-ice-bg); }
.orbit-badge[data-orbit="火"]    { color: var(--col-fire);   border-color: var(--col-fire-border);   background: var(--col-fire-bg); }
.orbit-badge[data-orbit="能量"]  { color: var(--col-energy); border-color: var(--col-energy-border); background: var(--col-energy-bg); }
.orbit-badge[data-orbit="引力"]  { color: var(--col-gravity);border-color: var(--col-gravity-border);background: var(--col-gravity-bg); }
.orbit-badge[data-orbit="波動"]  { color: var(--col-wave);   border-color: var(--col-wave-border);   background: var(--col-wave-bg); }
.orbit-badge[data-orbit="金屬"]  { color: var(--col-metal);  border-color: var(--col-metal-border);  background: var(--col-metal-bg); }

.layer-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem;
  letter-spacing: 0.05em;
  font-weight: 500;
}
/* layer-num inherits orbit colour from card's data-orbit */
.panel-card[data-orbit="開放"] .layer-num  { color: var(--col-open); }
.panel-card[data-orbit="光"] .layer-num    { color: var(--col-light); }
.panel-card[data-orbit="冰"] .layer-num    { color: var(--col-ice); }
.panel-card[data-orbit="火"] .layer-num    { color: var(--col-fire); }
.panel-card[data-orbit="能量"] .layer-num  { color: var(--col-energy); }
.panel-card[data-orbit="引力"] .layer-num  { color: var(--col-gravity); }
.panel-card[data-orbit="波動"] .layer-num  { color: var(--col-wave); }
.panel-card[data-orbit="金屬"] .layer-num  { color: var(--col-metal); }

/* Layer sections */
.layer-section {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.layer-block {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 7px;
  padding: 0.55rem 0.75rem;
}

.layer-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
  text-transform: uppercase;
}

.layer-info {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.card-name {
  font-size: 0.82rem;
  color: var(--text);
  font-weight: 400;
}

.partner-name {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.dir-tag {
  margin-left: auto;
  font-size: 0.65rem;
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.dir-順 { background: rgba(52,211,153,0.12); color: #e3e3e3; border: 1px solid rgba(52,211,153,0.25); }
.dir-逆 { background: rgba(249,115,22,0.12);  color: #e3e3e3; border: 1px solid rgba(249,115,22,0.25); }
.dir-na { background: rgba(107,131,168,0.1);  color: var(--text-dim); border: 1px solid rgba(107,131,168,0.2); }

.na-text { font-size: 0.78rem; color: var(--text-dim); }

/* Card footer */
.card-footer {
  margin-top: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.video-badge {
  padding: 0.18rem 0.52rem;
  border: 1px solid var(--col-open-border);
  border-radius: 999px;
  background: var(--col-open-bg);
  color: var(--col-open);
  font-size: 0.65rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.video-badge svg { width: 12px; height: 12px; }

.link-hint {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-dim);
}
.empty-state p { font-size: 0.85rem; margin-top: 0.5rem; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.show { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border-bright);
  border-radius: 14px;
  max-width: 480px;
  width: 100%;
  padding: 1.75rem;
  position: relative;
  animation: modalIn 0.2s ease;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(126,184,247,0.06);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 1.2rem; line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--text); }

.modal-header { margin-bottom: 1.25rem; }
.modal-orbit { margin-bottom: 0.4rem; }
.modal-layer {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}
.modal-layer-sub { font-size: 0.75rem; color: var(--text-muted); }

.modal-body { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }

.modal-block {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1rem;
}

.modal-block-title {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}

.modal-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.3rem; flex-wrap: wrap; }
.modal-row:last-child { margin-bottom: 0; }

.modal-label { font-size: 0.7rem; color: var(--text-muted); min-width: 40px; }
.modal-val { font-size: 0.85rem; color: var(--text); }

.modal-footer { display: flex; flex-direction: column; gap: 0.6rem; }

  { color: var(--col-fire);    border-color: var(--col-fire-border);    background: var(--col-fire-bg); }

/* endless card body */

    </div>

    <div class="dynamic-filter-panel" id="endlessDynamicFilterPanel">
      <div class="dynamic-filter-header">
        <div class="dynamic-filter-title">✦ 日卡篩選</div>
        <button class="btn-reset btn-reset-compact" onclick="clearEndlessDynamicFilters()">清除條件</button>
      </div>
      <div class="dynamic-filter-grid single-column">
        <div class="dynamic-layer-box">
          <div class="dynamic-layer-title">日卡選擇</div>
          <div class="dynamic-chip-row" id="endlessCardChips"></div>
        </div>
      </div>
      <div class="dynamic-no-match" id="endlessDynamicNoMatch">找不到完全相符的結果，建議嘗試其他日卡或搭檔</div>
    </div>
  </div>

  <div class="results-info" id="endlessInfo"></div>
  <div class="endless-grid" id="endlessGrid"></div>
</div>
</div><!-- end section-endless -->

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-header">
      <div class="modal-orbit" id="mOrbit"></div>
      <div class="modal-layer" id="mLayer"></div>
    </div>
    <div class="modal-body">
      <div class="modal-block" id="mUpperBlock">
        <div id="mUpperContent"></div>
      </div>
      <div class="modal-block" id="mLowerBlock">
        <div class="modal-block-title">▼ 下層</div>
        <div id="mLowerContent"></div>
      </div>
    </div>
    <div class="modal-footer" id="mFooter"></div>
  </div>
</div>

<script>

// Parse data
const LIMITS = { 光:210, 冰:210, 火:210, 能量:180, 引力:180, 金屬:180, 開放:300, 波動:60 };
const ORBIT_LABEL = { 開放:'開放穩定', 波動:'開放波動', 光:'光', 冰:'冰', 火:'火', 能量:'能量', 引力:'引力', 金屬:'金屬' };

let DATA = [];
let ENDLESS_DATA = [];
let ENDLESS_ALL = [];
let activeOrbit = null;
let activePartner = null;
let activeEndlessCard = null;
let layerOK = true;
let currentData = [];
let activeLayerFilters = { upper: [], lower: [] };

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    return {
      orbit: cols[0]?.trim(), layer: parseInt(cols[1]),
      upperCard: cols[2]?.trim(), upperPartner: cols[3]?.trim(), upperDir: cols[4]?.trim(),
      lowerCard: cols[5]?.trim(), lowerPartner: cols[6]?.trim(), lowerDir: cols[7]?.trim(),
      hasVideo: cols[8]?.trim() === 'TRUE', link: cols[9]?.trim()
    };
  }).filter(d => !isNaN(d.layer));
}

function parseEndlessCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    return {
      partner: cols[0]?.trim(),
      card:    cols[1]?.trim(),
      combo:   cols[2]?.trim(),
      score:   cols[3]?.trim(),
      hasVideo: cols[4]?.trim() === 'TRUE',
      link:    cols[5]?.trim()
    };
  }).filter(d => d.partner);
}

async function init() {
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfNvGSQbmwwXodVzmhuZfOAGIIE634hWTA6V1CTaQlF272v3VRJ5t_F7OfSKPH0qbBQbUSvLlQnw3x/pub?output=csv';
  const ENDLESS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfNvGSQbmwwXodVzmhuZfOAGIIE634hWTA6V1CTaQlF272v3VRJ5t_F7OfSKPH0qbBQbUSvLlQnw3x/pub?gid=1577067344&single=true&output=csv';

  // fetch last updated
  const SHEET_FILE_ID = '19RqMAlpyi1g9pXyJ1azm45pxfjvxRqxJOUCdsQpHKDo';
  const DRIVE_API_KEY = 'AIzaSyAzbzHaKnhio4gomMkPm-lppgkDpBj6TIw';

  document.getElementById('resultsInfo').innerHTML = '資料載入中…';
  document.getElementById('endlessInfo').innerHTML = '資料載入中…';

  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    DATA = parseCSV(text);
    applyFilters();
  } catch (err) {
    document.getElementById('resultsInfo').innerHTML = '⚠ 資料載入失敗，請重新整理頁面';
    console.error(err);
  }

  // fetch last updated, show in footer
  try {
    const metaUrl = `https://www.googleapis.com/drive/v3/files/${SHEET_FILE_ID}?fields=modifiedTime&key=${DRIVE_API_KEY}`;
    const metaRes = await fetch(metaUrl);
    const meta = await metaRes.json();
    const lastUpdatedEl = document.getElementById('lastUpdated');
    if (meta.modifiedTime && lastUpdatedEl) {
      const d = new Date(meta.modifiedTime);
      const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      lastUpdatedEl.textContent = `Last Updated: ${formatted}`;
    }
  } catch (err) {
    console.error('Last Updated fetch failed:', err);
  }

  try {
    const res = await fetch(ENDLESS_CSV_URL);
    const text = await res.text();
    ENDLESS_ALL = parseEndlessCSV(text);
    ENDLESS_DATA = [...ENDLESS_ALL];
    activePartner = null;
    applyEndlessFilters();
  } catch (err) {
    document.getElementById('endlessInfo').innerHTML = '⚠ 資料載入失敗，請重新整理頁面';
    console.error(err);
  }
}

function selectOrbit(btn) {
  const orbit = btn.dataset.orbit;
  activeLayerFilters = { upper: [], lower: [] };
  if (activeOrbit === orbit) {
    activeOrbit = null;
    btn.classList.remove('active');
  } else {
    document.querySelectorAll('#orbitChips .chip').forEach(c => c.classList.remove('active'));
    activeOrbit = orbit;
    btn.classList.add('active');
  }
  validateLayer();
}

function validateLayer() {
  const val = document.getElementById('layerInput').value.trim();
  const errEl = document.getElementById('layerError');
  const inp = document.getElementById('layerInput');
  layerOK = true;
  if (val !== '') {
    const num = parseInt(val);
    const limit = activeOrbit ? (LIMITS[activeOrbit] || 9999) : 9999;
    if (isNaN(num) || num < 1 || num > limit) {
      layerOK = false;
      inp.classList.add('error-input');
      errEl.classList.add('show');
    } else {
      inp.classList.remove('error-input');
      errEl.classList.remove('show');
    }
  } else {
    inp.classList.remove('error-input');
    errEl.classList.remove('show');
  }
  if (layerOK) applyFilters();
}

function onLayerInput() {
  activeLayerFilters = { upper: [], lower: [] };
  validateLayer();
}

function dirLabel(dir) {
  if (dir === '順') return '順譜';
  if (dir === '逆') return '逆譜';
  return dir;
}

function getBasePanelData(layerNum, videoOnly) {
  return DATA.filter(d => {
    if (activeOrbit && d.orbit !== activeOrbit) return false;
    if (layerNum !== null && d.layer !== layerNum) return false;
    if (videoOnly && !d.hasVideo) return false;
    return true;
  });
}

function addOption(map, type, value, label = value) {
  if (!value || value === 'N/A') return;
  const key = `${type}:${value}`;
  if (!map.has(key)) map.set(key, { type, value, label });
}

function leadingRank(value) {
  const match = String(value).match(/^(\d+)/);
  return match ? parseInt(match[1], 10) : 999;
}

function sortCardsByRank(a, b) {
  const rankDiff = leadingRank(a.value) - leadingRank(b.value);
  if (rankDiff !== 0) return rankDiff;
  return a.value.localeCompare(b.value, 'zh-Hant');
}

function collectLayerOptions(data, side) {
  const dirMap = new Map();
  const cardMap = new Map();
  const partnerMap = new Map();
  const prefix = side === 'upper' ? 'upper' : 'lower';
  data.forEach(d => {
    addOption(dirMap, 'dir', d[`${prefix}Dir`], dirLabel(d[`${prefix}Dir`]));
    addOption(cardMap, 'card', d[`${prefix}Card`]);
    addOption(partnerMap, 'partner', d[`${prefix}Partner`]);
  });
  const dirs = ['順', '逆']
    .map(dir => dirMap.get(`dir:${dir}`))
    .filter(Boolean);
  const cards = [...cardMap.values()].sort(sortCardsByRank);
  const partners = [...partnerMap.values()].sort((a, b) => a.value.localeCompare(b.value, 'zh-Hant'));
  return [...dirs, ...cards, ...partners];
}

function isDynamicFilterActive(side, option) {
  return activeLayerFilters[side].some(f => f.type === option.type && f.value === option.value);
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function toggleDynamicFilter(side, type, value) {
  const filters = activeLayerFilters[side];
  const idx = filters.findIndex(f => f.type === type && f.value === value);
  if (idx >= 0) {
    filters.splice(idx, 1);
  } else {
    const sameTypeIdx = filters.findIndex(f => f.type === type);
    if (sameTypeIdx >= 0) filters.splice(sameTypeIdx, 1);
    filters.push({ type, value });
  }
  applyFilters();
}

function toggleDynamicFilterFromButton(btn) {
  toggleDynamicFilter(btn.dataset.side, btn.dataset.type, btn.dataset.value);
}

function clearDynamicFilters() {
  activeLayerFilters = { upper: [], lower: [] };
  applyFilters();
}

function renderDynamicFilterSide(side, options) {
  const el = document.getElementById(side === 'upper' ? 'upperDynamicChips' : 'lowerDynamicChips');
  if (!el) return;
  if (options.length === 0) {
    el.innerHTML = '<span class="dynamic-empty">目前無可用條件</span>';
    return;
  }
  el.innerHTML = options.map(option => `
    <button class="dynamic-chip ${isDynamicFilterActive(side, option) ? 'active' : ''}"
      data-side="${side}"
      data-type="${option.type}"
      data-value="${escapeHtml(option.value)}"
      onclick="toggleDynamicFilterFromButton(this)">
      ${escapeHtml(option.label)}
    </button>
  `).join('');
}

function renderDynamicFilters(baseData, layerNum) {
  const panel = document.getElementById('dynamicFilterPanel');
  const noMatch = document.getElementById('dynamicNoMatch');
  if (!panel) return;
  const shouldShow = activeOrbit && layerNum !== null && layerOK;
  panel.classList.toggle('show', shouldShow);
  if (!shouldShow) {
    activeLayerFilters = { upper: [], lower: [] };
    if (noMatch) noMatch.classList.remove('show');
    return;
  }
  renderDynamicFilterSide('upper', collectLayerOptions(baseData, 'upper'));
  renderDynamicFilterSide('lower', collectLayerOptions(baseData, 'lower'));
}

function matchesLayerFilters(d, side) {
  const filters = activeLayerFilters[side];
  if (filters.length === 0) return true;
  const prefix = side === 'upper' ? 'upper' : 'lower';
  return filters.every(filter => {
    if (filter.type === 'dir') return d[`${prefix}Dir`] === filter.value;
    if (filter.type === 'card') return d[`${prefix}Card`] === filter.value;
    if (filter.type === 'partner') return d[`${prefix}Partner`] === filter.value;
    return true;
  });
}

function applyFilters() {
  const layerVal = document.getElementById('layerInput').value.trim();
  const layerNum = layerVal !== '' ? parseInt(layerVal) : null;
  const videoOnly = document.getElementById('videoOnly').checked;
  const baseData = getBasePanelData(layerNum, videoOnly);
  renderDynamicFilters(baseData, layerNum);
  currentData = baseData.filter(d => matchesLayerFilters(d, 'upper') && matchesLayerFilters(d, 'lower'));
  const noMatch = document.getElementById('dynamicNoMatch');
  const hasSelectedDynamicFilters = activeLayerFilters.upper.length > 0 || activeLayerFilters.lower.length > 0;
  if (noMatch) noMatch.classList.toggle('show', hasSelectedDynamicFilters && currentData.length === 0);
  renderCards();
}

function resetFilters() {
  activeOrbit = null;
  activeLayerFilters = { upper: [], lower: [] };
  document.querySelectorAll('#orbitChips .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('layerInput').value = '';
  document.getElementById('layerInput').classList.remove('error-input');
  document.getElementById('layerError').classList.remove('show');
  document.getElementById('videoOnly').checked = false;
  layerOK = true;
  applyFilters();
}

function cardLayerBlock(card, partner, dir, label) {
  if (card === 'N/A') return `<div class="layer-block"><div class="layer-label">${label}</div><div class="layer-info"><span class="na-text">單層面板</span></div></div>`;
  const dirHtml = (dir && dir !== 'N/A')
    ? `<span class="dir-tag dir-${dir}" style="margin-left:auto">${dir}譜</span>`
    : '';
  return `<div class="layer-block">
    <div class="layer-label">${label}</div>
    <div class="layer-info">
      <div><div class="card-name">${card}</div><div class="partner-name">${partner}</div></div>
      ${dirHtml}
    </div>
  </div>`;
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  document.getElementById('resultsInfo').innerHTML = `共找到 <span>${currentData.length}</span> 筆結果`;
  if (currentData.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div style="font-size:2rem;margin-bottom:0.5rem;opacity:0.3">😣</div><p>找不到符合條件的結果，期待您成為第一位分享者✨</p></div>`;
    updateScrollButtons();
    return;
  }
  grid.innerHTML = currentData.map((d, i) => `
    <div class="panel-card" data-orbit="${d.orbit}" onclick="openModal(${i})">
      <div class="card-orbit-bar">
        <div class="card-labels">
          <span class="orbit-badge" data-orbit="${d.orbit}">${ORBIT_LABEL[d.orbit] || d.orbit}</span>
          ${d.hasVideo ? '<span class="video-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 附影片</span>' : ''}
        </div>
        <div class="card-meta-right">
          <span class="layer-num">${d.layer} 層</span>
        </div>
      </div>
      <div class="layer-section">
        ${cardLayerBlock(d.upperCard, d.upperPartner, d.upperDir, '▲ 上層')}
        ${cardLayerBlock(d.lowerCard, d.lowerPartner, d.lowerDir, '▼ 下層')}
      </div>
      <div class="card-footer">
        <span></span>
        <span class="link-hint">點擊查看詳情 →</span>
      </div>
    </div>`).join('');
  updateScrollButtons();
}

function dirTag(dir) {
  if (!dir || dir === 'N/A') return '<span class="dir-tag dir-na">—</span>';
  return `<span class="dir-tag dir-${dir}">${dir}</span>`;
}

function modalBlock(card, partner, dir) {
  if (card === 'N/A') return '<div class="modal-row"><span class="na-text" style="color:var(--text-dim)">單層面板（無此層配置）</span></div>';
  const dirText = dir === '順' ? '順譜' : dir === '逆' ? '逆譜' : '—';
  return `<div class="modal-row"><span class="modal-label">日卡</span><span class="modal-val">${card}</span></div>
    <div class="modal-row"><span class="modal-label">搭檔</span><span class="modal-val">${partner}</span></div>
    <div class="modal-row"><span class="modal-label">對譜情形</span><span class="modal-val">${dirText}</span></div>`;
}

function openModal(idx) {
  const d = currentData[idx];
  // restore block titles for panel cards
  document.getElementById('mUpperBlock').querySelector('.modal-block-title') && document.getElementById('mUpperBlock').querySelector('.modal-block-title').remove();
  document.getElementById('mLowerBlock').querySelector('.modal-block-title') && document.getElementById('mLowerBlock').querySelector('.modal-block-title').remove();
  document.getElementById('mUpperBlock').insertAdjacentHTML('afterbegin', '<div class="modal-block-title">▲ 上層</div>');
  document.getElementById('mLowerBlock').insertAdjacentHTML('afterbegin', '<div class="modal-block-title">▼ 下層</div>');

  document.getElementById('mOrbit').innerHTML = `<span class="orbit-badge" data-orbit="${d.orbit}">${ORBIT_LABEL[d.orbit] || d.orbit}軌道</span>`;
  document.getElementById('mLayer').textContent = d.layer;
const orbitColors = {
  開放: 'var(--col-open)', 光: 'var(--col-light)', 冰: 'var(--col-ice)',
  火: 'var(--col-fire)', 能量: 'var(--col-energy)', 引力: 'var(--col-gravity)',
  波動: 'var(--col-wave)', 金屬: 'var(--col-metal)'
};
document.getElementById('mLayer').style.color = orbitColors[d.orbit] || 'var(--text)';
  document.getElementById('mUpperContent').innerHTML = modalBlock(d.upperCard, d.upperPartner, d.upperDir);
  document.getElementById('mLowerContent').innerHTML = modalBlock(d.lowerCard, d.lowerPartner, d.lowerDir);

  const orbitLabel = ORBIT_LABEL[d.orbit] || d.orbit;
  const reportUrl = `https://docs.google.com/forms/d/e/1FAIpQLSdu-eI87wlkR2LnTlwc3kzHD4pz_PL1-gydhwCr7W-7HKOxyg/viewform?usp=pp_url&entry.1527588954=${encodeURIComponent(orbitLabel)}&entry.1863774587=${encodeURIComponent(d.layer)}&entry.1242930374=${encodeURIComponent(d.link)}`;

  document.getElementById('mFooter').innerHTML = `
    <a href="${d.link}" target="_blank" rel="noopener" class="btn-fb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      前往Facebook查看
    </a>
    <a href="${reportUrl}" target="_blank" rel="noopener" class="btn-report">
      問題回報
    </a>`;

  document.getElementById('modalOverlay').classList.add('show');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-' + tab).classList.add('active');
  updateScrollButtons();
}

function selectPartnerDropdown(value) {
  activePartner = value || null;
  activeEndlessCard = null;
  applyEndlessFilters();
}

function collectEndlessCardOptions(data) {
  const cardMap = new Map();
  data.forEach(d => addOption(cardMap, 'card', d.card));
  return [...cardMap.values()].sort(sortCardsByRank);
}

function renderEndlessDynamicFilters(baseData) {
  const panel = document.getElementById('endlessDynamicFilterPanel');
  const chips = document.getElementById('endlessCardChips');
  const noMatch = document.getElementById('endlessDynamicNoMatch');
  if (!panel || !chips) return;
  const shouldShow = Boolean(activePartner);
  panel.classList.toggle('show', shouldShow);
  if (!shouldShow) {
    activeEndlessCard = null;
    if (noMatch) noMatch.classList.remove('show');
    return;
  }

  const options = collectEndlessCardOptions(baseData);
  if (options.length === 0) {
    chips.innerHTML = '<span class="dynamic-empty">目前無可用日卡</span>';
    return;
  }
  chips.innerHTML = options.map(option => `
    <button class="dynamic-chip ${activeEndlessCard === option.value ? 'active' : ''}"
      data-value="${escapeHtml(option.value)}"
      onclick="toggleEndlessCardFilter(this.dataset.value)">
      ${escapeHtml(option.label)}
    </button>
  `).join('');
}

function toggleEndlessCardFilter(value) {
  activeEndlessCard = activeEndlessCard === value ? null : value;
  applyEndlessFilters();
}

function clearEndlessDynamicFilters() {
  activeEndlessCard = null;
  applyEndlessFilters();
}

function applyEndlessFilters() {
  const videoOnly = document.getElementById('endlessVideoOnly').checked;
  const baseData = ENDLESS_ALL.filter(d => {
    if (activePartner && d.partner !== activePartner) return false;
    if (videoOnly && !d.hasVideo) return false;
    return true;
  });
  renderEndlessDynamicFilters(baseData);
  ENDLESS_DATA = baseData.filter(d => !activeEndlessCard || d.card === activeEndlessCard);
  const noMatch = document.getElementById('endlessDynamicNoMatch');
  if (noMatch) noMatch.classList.toggle('show', Boolean(activeEndlessCard) && ENDLESS_DATA.length === 0);
  renderEndless();
}

function resetEndlessFilters() {
  activePartner = null;
  activeEndlessCard = null;
  document.getElementById('partnerSelect').value = '';
  document.getElementById('endlessVideoOnly').checked = false;
  ENDLESS_DATA = [...ENDLESS_ALL];
  renderEndlessDynamicFilters(ENDLESS_DATA);
  renderEndless();
}

function fmtScore(s) {
  const n = parseInt(s);
  if (isNaN(n)) return s;
  return n.toLocaleString();
}

function renderEndless() {
  const grid = document.getElementById('endlessGrid');
  const info = document.getElementById('endlessInfo');
  info.innerHTML = `共找到 <span>${ENDLESS_DATA.length}</span> 筆結果`;
  if (ENDLESS_DATA.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div style="font-size:2rem;margin-bottom:0.5rem;opacity:0.3">😣</div><p>找不到符合條件的結果，期待您成為第一位分享者✨</p></div>`;
    updateScrollButtons();
    return;
  }
  grid.innerHTML = ENDLESS_DATA.map((d, i) => `
    <div class="endless-card" data-partner="${d.partner}" onclick="openEndlessModal(${i})">
      <div class="endless-card-header">
        <div class="card-labels">
          <span class="partner-badge" data-partner="${d.partner}">${d.partner}</span>
          ${d.hasVideo ? '<span class="video-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 附影片</span>' : ''}
        </div>
        <div class="card-meta-right">
          <span class="endless-score">${fmtScore(d.score)} 分</span>
        </div>
      </div>
      <div class="endless-info-row">
        <span class="endless-info-label">日卡</span>
        <span class="endless-info-val">${d.card}</span>
      </div>
      <div class="endless-info-row">
        <span class="endless-info-label">對譜數</span>
        <span class="combo-tag">${d.combo} 譜</span>
      </div>
      <div class="endless-footer">
        <span></span>
        <span class="link-hint">點擊查看詳情 →</span>
      </div>
    </div>`).join('');
  updateScrollButtons();
}

function openEndlessModal(idx) {
  const d = ENDLESS_DATA[idx];
  // remove block titles for endless (no upper/lower layers)
  document.getElementById('mUpperBlock').querySelector('.modal-block-title') && document.getElementById('mUpperBlock').querySelector('.modal-block-title').remove();
  document.getElementById('mLowerBlock').querySelector('.modal-block-title') && document.getElementById('mLowerBlock').querySelector('.modal-block-title').remove();

  document.getElementById('mOrbit').innerHTML = `<span class="partner-badge" data-partner="${d.partner}">${d.partner}</span>`;
  document.getElementById('mLayer').textContent = fmtScore(d.score) + ' 分';
  document.getElementById('mLayer').style.color = 'var(--text)';
  document.getElementById('mUpperContent').innerHTML = `
    <div class="modal-row"><span class="modal-label">日卡</span><span class="modal-val">${d.card}</span></div>
    <div class="modal-row"><span class="modal-label">對譜數</span><span class="modal-val">${d.combo} 譜</span></div>`;
  document.getElementById('mLowerBlock').style.display = 'none';

  const reportUrl = `https://docs.google.com/forms/d/e/1FAIpQLSdP6bWGJ6GFkyOZ7dWsqDbiup7KzTyJGxw9Feta-EqCS3pG6w/viewform?usp=pp_url&entry.1527588954=${encodeURIComponent(d.partner)}&entry.1242930374=${encodeURIComponent(d.link)}`;

  document.getElementById('mFooter').innerHTML = `
    <a href="${d.link}" target="_blank" rel="noopener" class="btn-fb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      前往Facebook查看
    </a>
    <a href="${reportUrl}" target="_blank" rel="noopener" class="btn-report">
      問題回報
    </a>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('mLowerBlock').style.display = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function scrollToBottom() {
  window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
}

function updateScrollButtons() {
  const topBtn = document.getElementById('backToTopBtn');
  const bottomBtn = document.getElementById('backToBottomBtn');
  const viewportH = window.innerHeight;
  const fullH = document.documentElement.scrollHeight;
  const maxScroll = fullH - viewportH;

  // top botton and bottom botton setting
  if (maxScroll <= 0) {
    topBtn.classList.remove('show');
    bottomBtn.classList.remove('show');
    return;
  }

  const scrollY = window.scrollY;
  const showTopBtnAfter = 500;
  topBtn.classList.toggle('show', scrollY > showTopBtnAfter);
  bottomBtn.classList.toggle('show', (maxScroll - scrollY) > 10);
}

window.addEventListener('scroll', updateScrollButtons);
window.addEventListener('resize', updateScrollButtons);

init();
updateScrollButtons();
</script>
